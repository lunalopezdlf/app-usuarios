<div class="card bg-dark text-white border border-3 border-white p-3 shadow-lg user-card animate-fade rounded-4">

    <figure class="text-center mb-3">
        <img 
        [src]="user()?.image"
        [alt]="user()?.first_name + ' ' + user()?.last_name"
        class="rounded-circle img-fluid shadow-lg border border-3 border-white user-photo-hover user-img mx-auto d-block">
    </figure>

    <div class="text-center mb-3">
        <h4 class="fw-bold">{{ user()?.first_name }} {{ user()?.last_name }}</h4>
        <p class="text-info">{{ user()?.username }}</p>
    </div>

    <div class="d-flex justify-content-center gap-4 mt-2">
        <i class="bi bi-search action-icon text-light"
        [routerLink]="['/user', user()?._id]"></i>

        <i class="bi bi-arrow-clockwise action-icon text-info"
        [routerLink]="['/updateuser', user()?._id]"></i>

        <i class="bi bi-trash action-icon text-danger"
        (click)="confirmDelete()"></i>
    </div>

</div>
